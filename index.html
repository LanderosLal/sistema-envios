<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LandsEnvios - Login</title>
    <link rel="stylesheet" href="CSS/auth.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h1>Bienvenido</h1>
            <p>Inicia sesión o crea una cuenta para tus envíos.</p>
            
            <form id="auth-form">
                <input type="email" id="email" placeholder="Correo electrónico" required>
                <input type="password" id="password" placeholder="Contraseña" required>
                
                <div class="buttons">
                    <button type="submit" id="login-btn">Iniciar Sesión</button>
                    <button type="button" id="register-btn" class="secondary">Crear Cuenta</button>
                </div>
            </form>
            <p id="auth-message" class="message"></p>
        </div>
    </div>
    <script src="js/auth.js"></script>
</body>
</html>
